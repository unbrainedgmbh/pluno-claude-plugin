name: Validate plugin marketplace

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate.mjs
      - run: npx -y @anthropic-ai/claude-code@2.1.178 plugin validate .
